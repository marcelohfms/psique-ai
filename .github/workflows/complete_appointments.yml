name: Complete past appointments

on:
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch:      # allow manual runs

jobs:
  complete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Mark completed appointments and send post-consultation messages
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          UAZAPI_BASE_URL: ${{ secrets.UAZAPI_BASE_URL }}
          UAZAPI_TOKEN: ${{ secrets.UAZAPI_TOKEN }}
        run: uv run python scripts/complete_appointments.py
